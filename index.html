<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>une tite surprise pour toi.. 🤭 </title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  margin-top: 60px;
  font-size: 40px;
  animation: fadeIn 2s ease-in-out;
}

button {
  background: hotpink;
  border: none;
  padding: 12px 25px;
  color: white;
  font-size: 16px;
  border-radius: 30px;
  cursor: pointer;
  margin: 10px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

.hidden {
  display: none;
}

.gallery img {
  width: 200px;
  border-radius: 20px;
  margin: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.1);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
}

.modal img {
  width: 80%;
  border-radius: 20px;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

.heart {
  position: fixed;
  top: -10px;
  color: pink;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<h1>moi aussi je sais faire 😝</h1>

<button onclick="startExperience()">Clique ici si t’es prêt 👀</button>

<div id="content" class="hidden">

<h2>nos moments 💕</h2>

<div class="gallery">
  <img src="photo1.jpg" onclick="openModal(this.src)">
  <img src="photo2.jpg" onclick="openModal(this.src)">
</div>

<h2 style="margin-top:50px;">Et toi tu m'aimes ? 😌</h2>

<button onclick="yesLove()">oui ❤️</button>
<button id="noBtn" onmouseover="moveButton()">non.. </button>

<p id="result" style="font-size:20px; margin-top:20px;"></p>

</div>

<div id="modal" class="modal" onclick="closeModal()">
  <img id="modalImg">
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function startExperience() {
  document.getElementById("content").classList.remove("hidden");
  document.getElementById("music").play();
  createHearts();
}

function openModal(src) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalImg").src = src;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function yesLove() {
  document.getElementById("result").innerHTML = "moi aussi je t’aime plus que tout 💖";
}

function moveButton() {
  var btn = document.getElementById("noBtn");
  btn.style.position = "absolute";
  btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
  btn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 5000);
  }, 300);
}
</script>

</body>
</html>
